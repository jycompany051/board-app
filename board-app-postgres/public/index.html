<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>확장형 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div>
          <h1>게시판</h1>
          <p class="subtitle">공개 글쓰기 · 관리자 공지/답글/삭제 · PostgreSQL + Redis 확장형</p>
        </div>
        <div class="admin-actions">
          <span id="adminStatus" class="admin-status">관리자 로그아웃 상태</span>
          <button id="openLoginBtn" class="secondary-btn">관리자 로그인</button>
          <button id="logoutBtn" class="danger-btn hidden">로그아웃</button>
        </div>
      </header>

      <section class="card form-card">
        <div class="section-head">
          <h2>새 글 작성</h2>
          <p>최신글이 위로 올라가며, 최신글일수록 번호가 큽니다.</p>
        </div>
        <form id="postForm">
          <div class="grid two">
            <label>
              작성자
              <input type="text" id="authorName" maxlength="30" placeholder="이름 또는 닉네임" required />
            </label>
            <label>
              제목
              <input type="text" id="postTitle" maxlength="120" placeholder="제목" required />
            </label>
          </div>

          <div class="editor-wrap">
            <div id="postToolbar">
              <select class="ql-font"></select>
              <select class="ql-size"></select>
              <button class="ql-bold"></button>
              <button class="ql-italic"></button>
              <button class="ql-underline"></button>
              <button class="ql-strike"></button>
              <select class="ql-color"></select>
              <select class="ql-background"></select>
              <select class="ql-align"></select>
              <button class="ql-blockquote"></button>
              <button class="ql-code-block"></button>
              <button class="ql-list" value="ordered"></button>
              <button class="ql-list" value="bullet"></button>
              <button class="ql-link"></button>
              <button class="ql-clean"></button>
            </div>
            <div id="postEditor" class="editor"></div>
          </div>

          <div class="form-actions">
            <button type="submit" class="primary-btn">글 등록</button>
          </div>
        </form>
      </section>

      <section id="noticeSection" class="card form-card hidden">
        <div class="section-head">
          <h2>관리자 공지 작성</h2>
          <p>공지글은 &lt;공지&gt; 표시, 상단 고정, 번호 없음</p>
        </div>
        <form id="noticeForm">
          <label>
            공지 제목
            <input type="text" id="noticeTitle" maxlength="120" placeholder="공지 제목" />
          </label>
          <div class="editor-wrap">
            <div id="noticeToolbar">
              <select class="ql-font"></select>
              <select class="ql-size"></select>
              <button class="ql-bold"></button>
              <button class="ql-italic"></button>
              <button class="ql-underline"></button>
              <button class="ql-color"></button>
              <button class="ql-background"></button>
              <button class="ql-list" value="bullet"></button>
              <button class="ql-link"></button>
              <button class="ql-clean"></button>
            </div>
            <div id="noticeEditor" class="editor small"></div>
          </div>
          <div class="form-actions">
            <button type="submit" class="primary-btn">공지 등록</button>
          </div>
        </form>
      </section>

      <section class="card list-card">
        <div class="section-head">
          <h2>글 목록</h2>
          <p>공지글은 위에 고정되고, 관리자 답글은 부모글 바로 아래에 붙습니다.</p>
        </div>
        <div id="postList" class="post-list"></div>
      </section>
    </div>

    <div id="loginModal" class="modal hidden">
      <div class="modal-panel">
        <div class="modal-head">
          <h3>관리자 로그인</h3>
          <button id="closeLoginBtn" class="icon-btn" type="button">×</button>
        </div>
        <form id="loginForm">
          <label>
            아이디
            <input type="text" id="loginUsername" placeholder="관리자 아이디" required />
          </label>
          <label>
            비밀번호
            <input type="password" id="loginPassword" placeholder="비밀번호" required />
          </label>
          <button type="submit" class="primary-btn full">로그인</button>
        </form>
      </div>
    </div>

    <template id="replyFormTemplate">
      <form class="reply-form hidden">
        <label>
          답글 제목
          <input type="text" class="reply-title" maxlength="120" placeholder="예: 답변드립니다" />
        </label>
        <div class="editor-wrap compact">
          <div class="reply-toolbar">
            <select class="ql-font"></select>
            <select class="ql-size"></select>
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-color"></button>
            <button class="ql-background"></button>
            <button class="ql-list" value="bullet"></button>
            <button class="ql-link"></button>
            <button class="ql-clean"></button>
          </div>
          <div class="reply-editor editor mini"></div>
        </div>
        <div class="inline-actions">
          <button type="submit" class="primary-btn">답글 등록</button>
          <button type="button" class="secondary-btn cancel-reply-btn">취소</button>
        </div>
      </form>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
